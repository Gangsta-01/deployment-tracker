version: '3.8'

services:

  # ── MySQL Database ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: deploypulse-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE:      deploypulse
      MYSQL_USER:          deploypulse_user
      MYSQL_PASSWORD:      yourStrongPassword123
    ports:
      - "3306:3306"           # expose for local DB tools (e.g. TablePlus)
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deploypulse-backend
    restart: unless-stopped
    environment:
      NODE_ENV:       production
      PORT:           5000
      DB_HOST:        db
      DB_PORT:        3306
      DB_USER:        deploypulse_user
      DB_PASS:        yourStrongPassword123
      DB_NAME:        deploypulse
      JWT_SECRET:     change-this-to-a-very-long-random-secret
      JWT_EXPIRES_IN: 8h
      CORS_ORIGINS:   http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deploypulse-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local

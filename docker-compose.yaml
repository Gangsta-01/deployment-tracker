version: "3.9"

services:

  backend:
    image: vaibhavk00/deploy-track-be:v1
    container_name: deploy-track-backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "5000:5000"

    networks:
      - deploy-network

  frontend:
    image: vaibhavk00/deploy-track-fe:v1
    container_name: deploy-track-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "3000:80"

    networks:
      - deploy-network

networks:
  deploy-network:
    driver: bridge